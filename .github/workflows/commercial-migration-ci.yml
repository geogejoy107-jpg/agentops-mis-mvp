name: Commercial Migration CI

on:
  push:
    branches:
      - codex/commercial-migration-closed-loop
      - codex/commercial-human-session-memory-review
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: commercial-migration-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AGENTOPS_DEPLOYMENT_MODE: local
  AGENTOPS_SKIP_SEED_EXPORTS: "1"
  HERMES_ALLOW_REAL_RUN: "false"
  HERMES_REQUIRE_CONFIRM_RUN: "true"
  DIFY_ALLOW_REAL_UPLOAD: "false"
  NOTION_TOKEN: ""
  NOTION_PARENT_PAGE_ID: ""
  NOTION_DATABASE_ID: ""
  AGENTOPS_POSTGRES_IMAGE: "postgres:16.14-alpine3.23@sha256:c95dee655b8a0743021bdbd2d21abb7ef2fd520c5df39bd328798769c049648f"

jobs:
  commercial-core:
    name: Commercial core gates
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11.9"

      - name: Syntax and static checks
        run: |
          set -euo pipefail
          python3 -m py_compile server.py
          python3 -m compileall -q scripts agentops_mis_cli agentops_mis_storage
          python3 scripts/commercial_ci_supply_chain_smoke.py
          python3 scripts/commercial_ci_receipt_smoke.py
          git diff --check

      - name: Commercial evidence and governance gates
        run: |
          set -euo pipefail
          python3 scripts/commercial_exact_head_ci_evidence_smoke.py
          python3 scripts/commercial_release_status_api_smoke.py
          python3 scripts/commercial_release_promotion_preflight_smoke.py
          python3 scripts/commercial_release_promotion_packet_smoke.py
          python3 scripts/commercial_release_grade_receipt_plan_smoke.py
          python3 scripts/commercial_release_grade_rerun_bundle_smoke.py
          python3 scripts/commercial_release_grade_rerun_bundle_api_smoke.py
          python3 scripts/commercial_release_grade_receipt_recording_smoke.py
          python3 scripts/commercial_release_grade_receipt_recording_api_smoke.py
          python3 -I -B -S scripts/commercial_release_grade_promotion_smoke.py
          python3 scripts/commercial_evidence_receipts_smoke.py
          python3 scripts/commercial_current_evidence_status_smoke.py
          python3 scripts/commercial_handoff_status_smoke.py
          python3 scripts/release_evidence_packet_smoke.py
          python3 scripts/commercial_release_evidence_packet_smoke.py
          python3 scripts/release_freeze_protocol_smoke.py
          python3 scripts/merge_readiness_status_smoke.py
          python3 scripts/commercial_migration_readiness.py
          python3 scripts/commercial_entitlements_smoke.py
          python3 scripts/team_entitlement_enrollment_smoke.py
          python3 scripts/enrollment_approval_workflow_smoke.py
          python3 scripts/production_auth_fail_closed_smoke.py --configured-production-fixture
          python3 scripts/security_production_readiness_smoke.py --configured-production-fixture
          python3 scripts/agent_gateway_scope_matrix_smoke.py --isolated-fixture
          python3 scripts/workspace_isolation_smoke.py --isolated-fixture
          python3 scripts/workspace_rbac_governance_smoke.py --isolated-fixture
          python3 scripts/workspace_memory_session_governance_smoke.py --isolated-fixture

  storage-postgres:
    name: Storage and Postgres parity
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11.9"

      - name: Storage boundary and Postgres parity receipts
        run: |
          set -uo pipefail
          mkdir -p receipts/gate3
          status=0
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_3_storage_boundary_before_postgres --command-id storage_boundary_sqlite --output receipts/gate3/storage_boundary_sqlite.json -- python3 scripts/storage_boundary_sqlite_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_3_storage_boundary_before_postgres --command-id storage_postgres_contract --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate3/storage_postgres_contract.json -- python3 scripts/storage_postgres_contract_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_3_storage_boundary_before_postgres --command-id storage_postgres_container --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate3/storage_postgres_container.json -- python3 scripts/storage_postgres_container_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_3_storage_boundary_before_postgres --command-id storage_postgres_adapter_contract --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate3/storage_postgres_adapter_contract.json -- python3 scripts/storage_postgres_adapter_contract_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_3_storage_boundary_before_postgres --command-id storage_postgres_optional_adapter --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate3/storage_postgres_optional_adapter.json -- python3 scripts/storage_postgres_optional_adapter_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_3_storage_boundary_before_postgres --command-id storage_postgres_boundary_parity --expected-contract postgres_boundary_fixture_parity_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate3/storage_postgres_boundary_parity.json -- python3 scripts/storage_postgres_boundary_parity_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_3_storage_boundary_before_postgres --command-id storage_postgres_route_read_model --expected-contract postgres_route_read_model_parity_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate3/storage_postgres_route_read_model.json -- python3 scripts/storage_postgres_route_read_model_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_3_storage_boundary_before_postgres --command-id storage_backend_selection --expected-contract storage_backend_selection_fail_closed_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate3/storage_backend_selection.json -- python3 scripts/storage_backend_selection_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_3_storage_boundary_before_postgres --command-id storage_postgres_http_read_parity --expected-contract postgres_http_read_parity_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate3/storage_postgres_http_read_parity.json -- python3 scripts/storage_postgres_http_read_parity_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_3_storage_boundary_before_postgres --command-id storage_postgres_cli_read_parity --expected-contract postgres_cli_read_parity_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate3/storage_postgres_cli_read_parity.json -- python3 scripts/storage_postgres_cli_read_parity_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_3_storage_boundary_before_postgres --command-id storage_postgres_write_helper_parity --expected-contract postgres_write_helper_parity_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate3/storage_postgres_write_helper_parity.json -- python3 scripts/storage_postgres_write_helper_parity_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_3_storage_boundary_before_postgres --command-id storage_postgres_http_write_task --expected-contract postgres_http_write_task_parity_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate3/storage_postgres_http_write_task.json -- python3 scripts/storage_postgres_http_write_task_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_3_storage_boundary_before_postgres --command-id storage_postgres_gateway_lifecycle --expected-contract postgres_http_gateway_lifecycle_write_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate3/storage_postgres_gateway_lifecycle.json -- python3 scripts/storage_postgres_gateway_lifecycle_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_3_storage_boundary_before_postgres --command-id storage_postgres_cli_write_parity --expected-contract postgres_cli_write_parity_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate3/storage_postgres_cli_write_parity.json -- python3 scripts/storage_postgres_cli_write_parity_smoke.py || status=1
          exit "$status"

      - name: Assemble Gate 3 receipt
        id: gate3_receipt
        if: always()
        continue-on-error: true
        run: |
          python3 scripts/commercial_ci_receipt.py scope \
            --gate-id gate_3_storage_boundary_before_postgres \
            --receipts-dir receipts/gate3 \
            --required-command-id storage_boundary_sqlite \
            --required-command-id storage_postgres_contract \
            --required-command-id storage_postgres_container \
            --required-command-id storage_postgres_adapter_contract \
            --required-command-id storage_postgres_optional_adapter \
            --required-command-id storage_postgres_boundary_parity \
            --required-command-id storage_postgres_route_read_model \
            --required-command-id storage_backend_selection \
            --required-command-id storage_postgres_http_read_parity \
            --required-command-id storage_postgres_cli_read_parity \
            --required-command-id storage_postgres_write_helper_parity \
            --required-command-id storage_postgres_http_write_task \
            --required-command-id storage_postgres_gateway_lifecycle \
            --required-command-id storage_postgres_cli_write_parity \
            --output receipts/gate3-scope.json

      - name: Upload Gate 3 receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: commercial-gate-3-receipt
          path: receipts/gate3-scope.json
          if-no-files-found: error

      - name: Enforce Gate 3 receipt completeness
        if: always() && steps.gate3_receipt.outcome != 'success'
        run: exit 1

  ui-parity:
    name: UI parity and build evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11.9"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.19.4"

      - name: Install UI dependencies and Playwright wrapper
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.codex/skills/playwright/scripts"
          cat > "$HOME/.codex/skills/playwright/scripts/playwright_cli.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          if ! command -v npx >/dev/null 2>&1; then
            echo "Error: npx is required but not found on PATH." >&2
            exit 1
          fi

          has_session_flag="false"
          for arg in "$@"; do
            case "$arg" in
              --session|--session=*)
                has_session_flag="true"
                break
                ;;
            esac
          done

          cmd=(npx --yes --package @playwright/cli@0.1.17 playwright-cli)
          if [[ "${has_session_flag}" != "true" && -n "${PLAYWRIGHT_CLI_SESSION:-}" ]]; then
            cmd+=(--session "${PLAYWRIGHT_CLI_SESSION}")
          fi
          cmd+=("$@")

          exec "${cmd[@]}"
          EOF
          chmod +x "$HOME/.codex/skills/playwright/scripts/playwright_cli.sh"
          (cd ui/start-building-app && npm ci)
          (cd ui/next-app && npm ci)

      - name: UI parity and build gates
        run: |
          set -euo pipefail
          python3 scripts/nextjs_parity_smoke.py
          python3 scripts/nextjs_production_python_proxy_fail_closed_smoke.py
          python3 scripts/worker_provider_call_evidence_smoke.py
          (cd ui/next-app && npm run test:control-plane-mode-contract)
          (cd ui/next-app && npm run test:human-scrypt-contract)
          (cd ui/next-app && npm run test:human-session-timestamp-contract)
          (cd ui/next-app && npm run test:memory-review-idempotency-contract)
          (cd ui/next-app && npm run typecheck)
          python3 scripts/ui_api_parity_matrix_smoke.py
          python3 scripts/ui_route_naming_decision_smoke.py
          python3 scripts/ui_legacy_route_alias_smoke.py
          python3 scripts/ui_navigation_inventory_smoke.py
          python3 scripts/ui_route_retirement_packet_smoke.py
          python3 scripts/ui_admin_operations_route_retirement_smoke.py
          python3 scripts/ui_covered_route_retirement_packet_smoke.py
          python3 scripts/vite_playwright_snapshot_smoke.py
          python3 scripts/nextjs_playwright_snapshot_smoke.py
          (cd ui/start-building-app && npm run build)
          (cd ui/next-app && npm run build)

  byoc-postgres:
    name: Independent Postgres and BYOC evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16.14-alpine3.23@sha256:c95dee655b8a0743021bdbd2d21abb7ef2fd520c5df39bd328798769c049648f
        env:
          POSTGRES_USER: agentops
          POSTGRES_PASSWORD: agentops
          POSTGRES_DB: agentops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentops -d agentops"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11.9"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.19.4"

      - name: Install Next and Playwright wrapper
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.codex/skills/playwright/scripts"
          cat > "$HOME/.codex/skills/playwright/scripts/playwright_cli.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          cmd=(npx --yes --package @playwright/cli@0.1.17 playwright-cli)
          if [[ -n "${PLAYWRIGHT_CLI_SESSION:-}" ]]; then
            cmd+=(--session "${PLAYWRIGHT_CLI_SESSION}")
          fi
          cmd+=("$@")
          exec "${cmd[@]}"
          EOF
          chmod +x "$HOME/.codex/skills/playwright/scripts/playwright_cli.sh"
          (cd ui/next-app && npm ci)

      - name: Postgres and BYOC command receipts
        run: |
          set -uo pipefail
          mkdir -p receipts/gate5
          status=0
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id audit_retention_policy --expected-contract audit_retention_policy_v1 --output receipts/gate5/audit_retention_policy.json -- python3 scripts/audit_retention_policy_smoke.py --isolated-fixture || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id audit_retention_controls --expected-contract audit_retention_controls_v1 --output receipts/gate5/audit_retention_controls.json -- python3 scripts/audit_retention_controls_smoke.py --configured-fixture || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id deployment_enterprise --expected-contract deployment_readiness_v1 --expected-contract enterprise_byoc_controls_v1 --output receipts/gate5/deployment_enterprise.json -- python3 scripts/deployment_readiness_smoke.py --configured-retention-fixture --configured-enterprise-fixture || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id deployment_postgres_write --expected-contract deployment_readiness_postgres_runtime_write_fixture_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate5/deployment_postgres_write.json -- python3 scripts/deployment_readiness_smoke.py --postgres-write-fixture || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id nextjs_postgres_write --expected-contract nextjs_deployment_postgres_runtime_write_fixture_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate5/nextjs_postgres_write.json -- python3 scripts/nextjs_playwright_snapshot_smoke.py --postgres-write-fixture || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id byoc_acceptance --expected-contract byoc_deployment_acceptance_v1 --expected-contract postgres_backup_restore_v1 --expected-contract postgres_backup_manifest_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate5/byoc_acceptance.json -- python3 scripts/byoc_deployment_acceptance_smoke.py --postgres-readiness-fixture || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id nextjs_postgres_control_plane_tasks --expected-contract nextjs_postgres_control_plane_tasks_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate5/nextjs_postgres_control_plane_tasks.json -- python3 scripts/nextjs_postgres_control_plane_tasks_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id nextjs_postgres_worker_task_pull_claim --expected-contract nextjs_postgres_worker_task_pull_claim_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate5/nextjs_postgres_worker_task_pull_claim.json -- env AGENTOPS_POSTGRES_DSN="postgresql://agentops:agentops@127.0.0.1:5432/agentops" AGENTOPS_POSTGRES_SSL=0 npm --prefix ui/next-app run --silent test:worker-task-pull-claim-contract || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id nextjs_postgres_worker_gateway_direct --expected-contract agent_gateway_worker_direct_next_postgres_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate5/nextjs_postgres_worker_gateway_direct.json -- env AGENTOPS_POSTGRES_DSN="postgresql://agentops:agentops@127.0.0.1:5432/agentops" AGENTOPS_POSTGRES_SSL=0 npm --prefix ui/next-app run --silent test:worker-gateway-direct-contract || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id nextjs_postgres_memory_propose --expected-contract nextjs_postgres_memory_propose_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate5/nextjs_postgres_memory_propose.json -- python3 scripts/nextjs_postgres_memory_propose_smoke.py || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id nextjs_postgres_human_memory_review --expected-contract nextjs_postgres_human_memory_review_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate5/nextjs_postgres_human_memory_review.json -- python3 scripts/nextjs_postgres_human_memory_review_smoke.py --postgres-dsn postgresql://agentops:agentops@127.0.0.1:5432/agentops || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id nextjs_postgres_human_approval_decision --expected-contract nextjs_postgres_human_approval_decision_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate5/nextjs_postgres_human_approval_decision.json -- env AGENTOPS_TEST_POSTGRES_DSN="postgresql://agentops:agentops@127.0.0.1:5432/agentops" AGENTOPS_POSTGRES_SSL=0 npm --prefix ui/next-app run --silent test:approval-decision-contract || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id nextjs_postgres_customer_delivery_approval_request --expected-contract nextjs_postgres_customer_delivery_approval_request_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate5/nextjs_postgres_customer_delivery_approval_request.json -- env AGENTOPS_POSTGRES_DSN="postgresql://agentops:agentops@127.0.0.1:5432/agentops" AGENTOPS_POSTGRES_SSL=0 npm --prefix ui/next-app run --silent test:customer-delivery-approval-request-contract || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id nextjs_postgres_workspace_read_models --expected-contract nextjs_postgres_workspace_read_models_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate5/nextjs_postgres_workspace_read_models.json -- env AGENTOPS_POSTGRES_DSN="postgresql://agentops:agentops@127.0.0.1:5432/agentops" AGENTOPS_POSTGRES_SSL=0 npm --prefix ui/next-app run --silent test:workspace-read-model-contract || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id human_schema_v5_readiness --expected-contract human_memory_schema_readiness_v5 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate5/human_schema_v5_readiness.json -- env AGENTOPS_POSTGRES_DSN="postgresql://agentops:agentops@127.0.0.1:5432/agentops" AGENTOPS_POSTGRES_SSL=0 npm --prefix ui/next-app run --silent test:human-schema-contract || status=1
          python3 scripts/commercial_ci_receipt.py command --gate-id gate_5_byoc_enterprise_deployment_ci --command-id human_schema_v1_v2_v3_v4_to_v5_upgrade --expected-contract human_memory_schema_v1_v2_v3_v4_to_v5_upgrade_v1 --container-image "$AGENTOPS_POSTGRES_IMAGE" --output receipts/gate5/human_schema_v1_v2_v3_v4_to_v5_upgrade.json -- env AGENTOPS_POSTGRES_DSN="postgresql://agentops:agentops@127.0.0.1:5432/agentops" AGENTOPS_POSTGRES_SSL=0 npm --prefix ui/next-app run --silent test:human-schema-upgrade-contract || status=1
          exit "$status"

      - name: Assemble Gate 5 CI-scope receipt
        id: gate5_receipt
        if: always()
        continue-on-error: true
        run: |
          python3 scripts/commercial_ci_receipt.py scope \
            --gate-id gate_5_byoc_enterprise_deployment_ci \
            --receipts-dir receipts/gate5 \
            --required-command-id audit_retention_policy \
            --required-command-id audit_retention_controls \
            --required-command-id deployment_enterprise \
            --required-command-id deployment_postgres_write \
            --required-command-id nextjs_postgres_write \
            --required-command-id byoc_acceptance \
            --required-command-id nextjs_postgres_control_plane_tasks \
            --required-command-id nextjs_postgres_worker_task_pull_claim \
            --required-command-id nextjs_postgres_worker_gateway_direct \
            --required-command-id nextjs_postgres_memory_propose \
            --required-command-id nextjs_postgres_human_memory_review \
            --required-command-id nextjs_postgres_human_approval_decision \
            --required-command-id nextjs_postgres_customer_delivery_approval_request \
            --required-command-id nextjs_postgres_workspace_read_models \
            --required-command-id human_schema_v5_readiness \
            --required-command-id human_schema_v1_v2_v3_v4_to_v5_upgrade \
            --output receipts/gate5-scope.json

      - name: Upload Gate 5 CI-scope receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: commercial-gate-5-ci-receipt
          path: receipts/gate5-scope.json
          if-no-files-found: error

      - name: Enforce Gate 5 receipt completeness
        if: always() && steps.gate5_receipt.outcome != 'success'
        run: exit 1

  receipt-assemble:
    name: Assemble immutable commercial CI receipt
    if: always()
    needs:
      - commercial-core
      - storage-postgres
      - ui-parity
      - byoc-postgres
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Gate 3 receipt
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: commercial-gate-3-receipt
          path: ci-receipts/gate3

      - name: Download Gate 5 receipt
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: commercial-gate-5-ci-receipt
          path: ci-receipts/gate5

      - name: Assemble exact-head run receipt
        id: aggregate_receipt
        continue-on-error: true
        run: |
          python3 scripts/commercial_ci_receipt.py aggregate \
            --scope-receipt ci-receipts/gate3/gate3-scope.json \
            --scope-receipt ci-receipts/gate5/gate5-scope.json \
            --required-scope gate_3_storage_boundary_before_postgres \
            --required-scope gate_5_byoc_enterprise_deployment_ci \
            --job-result commercial-core=${{ needs['commercial-core'].result }} \
            --job-result storage-postgres=${{ needs['storage-postgres'].result }} \
            --job-result ui-parity=${{ needs['ui-parity'].result }} \
            --job-result byoc-postgres=${{ needs['byoc-postgres'].result }} \
            --output commercial-migration-ci-receipt.json

      - name: Upload aggregate receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: commercial-migration-ci-receipt
          path: commercial-migration-ci-receipt.json
          if-no-files-found: error

      - name: Enforce aggregate receipt completeness
        if: always() && steps.aggregate_receipt.outcome != 'success'
        run: exit 1
