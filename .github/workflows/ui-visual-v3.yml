name: UI Visual v3

on:
  pull_request:
    branches:
      - codex/agent-gateway-kb-demo
    paths:
      - "ui/start-building-app/**"
      - "docs/UI_VISUAL_SYSTEM_V3.md"
      - "docs/CODEX_PIXEL_ART_BATCH_HANDOFF.md"
      - ".github/workflows/ui-visual-v3.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/start-building-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/start-building-app/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
