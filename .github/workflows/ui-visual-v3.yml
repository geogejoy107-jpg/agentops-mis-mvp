name: UI Visual v3

on:
  pull_request:
    branches:
      - codex/agent-gateway-kb-demo
    paths:
      - "ui/start-building-app/**"
      - "docs/UI_VISUAL_SYSTEM_V3.md"
      - "docs/CODEX_PIXEL_ART_BATCH_HANDOFF.md"
      - ".github/workflows/ui-visual-v3.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/start-building-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/start-building-app/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Install visual test browser
        run: |
          npm install --no-save playwright@1.53.1
          npx playwright install --with-deps chromium
      - name: Start Vite
        run: nohup npm run dev -- --host 127.0.0.1 > /tmp/agentops-ui-v3.log 2>&1 &
      - name: Wait for UI
        run: |
          for attempt in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:5173/workspace/pixel-office >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/agentops-ui-v3.log
          exit 1
      - name: Capture screenshots
        run: |
          mkdir -p visual-artifacts
          node --input-type=module <<'NODE'
          import { chromium } from "playwright";
          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
          await page.goto("http://127.0.0.1:5173/workspace/pixel-office", { waitUntil: "networkidle" });
          await page.screenshot({ path: "visual-artifacts/pixel-office-page-v3.png" });
          const label = page.getByText(/Night-shift Agent Campus|夜班 Agent 园区/).first();
          await label.scrollIntoViewIfNeeded();
          const section = label.locator("xpath=ancestor::section[1]");
          await section.screenshot({ path: "visual-artifacts/pixel-office-map-v3.png", animations: "disabled" });
          await page.goto("http://127.0.0.1:5173/workspace", { waitUntil: "networkidle" });
          await page.screenshot({ path: "visual-artifacts/workspace-v3.png" });
          await browser.close();
          NODE
      - name: Upload visual review
        uses: actions/upload-artifact@v4
        with:
          name: ui-visual-v3-screenshots
          path: ui/start-building-app/visual-artifacts/*.png
          if-no-files-found: error
