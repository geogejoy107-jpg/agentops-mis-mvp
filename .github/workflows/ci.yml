name: AgentOps MIS CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: agentops-mis-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker-python-compatibility:
    name: Worker compatibility (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Worker compatibility surface
        run: |
          set -euo pipefail
          python3 -m py_compile \
            server.py \
            agentops_mis_cli/worker.py \
            agentops_mis_core/worker_fleet.py \
            scripts/worker_service_heartbeat_cadence_smoke.py \
            scripts/worker_intake_heartbeat_fleet_smoke.py

      - name: Run Worker compatibility smokes
        run: |
          set -euo pipefail
          timeout 120s python3 scripts/worker_service_heartbeat_cadence_smoke.py
          timeout 120s python3 scripts/worker_intake_heartbeat_fleet_smoke.py

  backend-deterministic:
    name: Backend deterministic smokes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AGENTOPS_DB_PATH: /tmp/agentops_ci.db
      AGENTOPS_HOST: 127.0.0.1
      AGENTOPS_PORT: "8787"
      AGENTOPS_BASE_URL: http://127.0.0.1:8787
      AGENTOPS_SKIP_SEED_EXPORTS: "1"
      AGENTOPS_DEPLOYMENT_MODE: local
      HERMES_ALLOW_REAL_RUN: "false"
      HERMES_REQUIRE_CONFIRM_RUN: "true"
      DIFY_ALLOW_REAL_UPLOAD: "false"
      NOTION_TOKEN: ""
      NOTION_PARENT_PAGE_ID: ""
      NOTION_DATABASE_ID: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax and diff checks
        run: |
          set -euo pipefail
          python3 -m py_compile server.py agentops_mis_cli/*.py agentops_mis_core/*.py agentops_mis_runtime/*.py scripts/*.py
          git diff --check

      - name: Offline safety smokes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          timeout 120s python3 scripts/redaction_policy_smoke.py
          timeout 120s python3 scripts/sqlite_pragmas_smoke.py
