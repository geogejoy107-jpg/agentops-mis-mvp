          name: agentops-server-log
          path: ${{ runner.temp }}/agentops-server.log
          if-no-files-found: ignore

  ui-build:
    name: UI build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/start-building-app/package-lock.json

      - name: Install and build
        working-directory: ui/start-building-app
        run: |
          set -euo pipefail
          npm ci
          npm run build

