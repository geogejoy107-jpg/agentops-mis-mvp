          python3 server.py --host 127.0.0.1 --port 8787 > "$RUNNER_TEMP/agentops-server.log" 2>&1 &
          echo "$!" > "$RUNNER_TEMP/agentops-server.pid"
          for attempt in $(seq 1 60); do
            if curl -fsS "$AGENTOPS_BASE_URL/api/agent-gateway/status" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/agentops-server.log"
          exit 1

