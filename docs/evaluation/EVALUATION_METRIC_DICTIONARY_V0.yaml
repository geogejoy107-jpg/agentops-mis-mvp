base_branch: "codex/agent-gateway-kb-demo"
base_commit: "4a4a96dc079d7d178894902626728648e73441b2"
issue: 16

evidence_levels:
  E1:
    name: "exact_head_ci"
    authority: "GitHub"
  E2:
    name: "versioned_acceptance"
    authority: "GitHub versioned docs and smokes"
  E3:
    name: "live_ledger"
    authority: "AgentOps MIS SQLite/API"
  E4:
    name: "user_study"
    authority: "Versioned redacted research artifact"
  E5:
    name: "economic_validation"
    authority: "Reviewed pilot economic baseline"

privacy:
  allow:
    - "counts"
    - "durations"
    - "statuses"
    - "stable IDs"
    - "hashes"
    - "short redacted summaries"
  deny_by_default:
    - "credentials"
    - "raw prompts"
    - "raw model responses"
    - "raw private transcripts"
    - "raw customer content"
    - "unsafe runtime logs"

metrics:
  - id: "FLOW-GTCR-01"
    name: "Governed Task Closure Rate"
    category: "workflow"
    kind: "ratio"
    numerator: "distinct governed non-synthetic tasks started in the window that reach evidence-ready accepted closure with no unresolved high/critical safety finding"
    denominator: "distinct governed non-synthetic tasks whose first governed run starts in the window"
    exclusions:
      - "CI and smoke fixtures"
      - "tasks cancelled before a run starts"
      - "historical imports outside the window"
      - "explicitly ungoverned local experiments"
    unit: "ratio"
    authority: "AgentOps MIS SQLite/API"
    evidence_level_required: "E3"
    cadence:
      - "rolling_7d"
      - "rolling_30d"
      - "milestone"
    owner: "Product owner + Evaluation steward"
    target: "baseline_first"
    current_value: null
    current_state: "unknown_not_measured"

